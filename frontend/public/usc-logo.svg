<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Club / trefoil shape in navy blue, matching the U.S. Cotton logo -->
  <g fill="#1a3a8f">
    <!-- top circle -->
    <circle cx="50" cy="28" r="18"/>
    <!-- bottom-left circle -->
    <circle cx="32" cy="56" r="18"/>
    <!-- bottom-right circle -->
    <circle cx="68" cy="56" r="18"/>
    <!-- stem -->
    <rect x="43" y="64" width="14" height="22" rx="3"/>
    <!-- base of stem -->
    <rect x="36" y="82" width="28" height="8" rx="4"/>
  </g>
</svg>
